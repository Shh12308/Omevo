<!-- Favicon & Manifest -->
<link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5847677612423434"
    crossorigin="anonymous"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log("Service Worker registered:", reg))
          .catch(err => console.error("SW registration failed:", err));
      });
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #001f3f, #007bff);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      color: #fff;
    }

    .auth-container {
      background: rgba(0, 0, 0, 0.65);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    h1 { color: #1db9ff; margin-bottom: 10px; }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
    }

    .oauth-btn:hover { transform: translateY(-2px); }

    .oauth-btn img { width: 24px; margin-right: 10px; }

    .google { background: #fff; color: #000; }
    .discord { background: #5865f2; color: #fff; }
    .facebook { background: #1877f2; color: #fff; }
  </style>
</head>

<body>

  <!-- Ad -->
  <ins class="adsbygoogle"
       style="display:block; margin-bottom:20px;"
       data-ad-client="ca-pub-5847677612423434"
       data-ad-slot="7864868911"
       data-ad-format="auto"></ins>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <div class="auth-container">
    <h1>Welcome to Omevo</h1>
    <p>Sign in to continue</p>

    <button class="oauth-btn google" onclick="login('google')" aria-label="Sign in with Google">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" />
      Sign in with Google
    </button>

    <button class="oauth-btn discord" onclick="login('discord')" aria-label="Sign in with Discord">
      <img src="https://www.svgrepo.com/show/353655/discord-icon.svg" alt="Discord Logo" />
      Sign in with Discord
    </button>

    <button class="oauth-btn facebook" onclick="login('facebook')" aria-label="Sign in with Facebook">
      <img src="https://www.svgrepo.com/show/157806/facebook.svg" alt="Facebook Logo" />
      Sign in with Facebook
    </button>
  </div>

  <script>
  const backendURL = "https://term-production-bf65.up.railway.app";

function login(provider) {
  const redirectURL = encodeURIComponent(
    `/callback.html?provider=${provider}`
  );

  window.location.href = `${backendURL}/auth/${provider}?redirect=${redirectURL}`;
}

  // 🔥 NEW: handle OAuth return (code in URL)
  function handleOAuthReturn() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      console.log("OAuth code detected, redirecting to callback...");
      window.location.href = `/callback.html?code=${code}`;
    }
  }

  handleOAuthReturn();
</script>

</body>
</html>
