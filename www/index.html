<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omevo - Meet New People</title>

  <!-- SEO / Social Meta Tags -->
  <meta name="description" content="Connect instantly with new friends via video chat on Omevo."/>
  <meta property="og:title" content="Omevo - Meet New People"/>
  <meta property="og:description" content="Connect instantly with new friends via video chat."/>
  <meta property="og:image" content="/images/og-image.png"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link rel="icon" type="image/png" href="/icons/favicon-32x32.png">
  <link rel="manifest" href="manifest.json">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5847677612423434"
    crossorigin="anonymous"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(() => console.log("Service Worker Registered"))
          .catch(err => console.error("SW registration failed:", err));
      });
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #001f3f, #007bff);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      color: #fff;
    }

    .auth-container {
      background: rgba(0, 0, 0, 0.65);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 { color: #1db9ff; }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .oauth-btn img {
      width: 24px;
      margin-right: 10px;
    }

    .google { background: #fff; color: #000; }
    .discord { background: #5865f2; color: #fff; }
    .facebook { background: #1877f2; color: #fff; }
  </style>
</head>

<body>

  <!-- Ad -->
  <ins class="adsbygoogle"
       style="display:block; margin-bottom:20px;"
       data-ad-client="ca-pub-5847677612423434"
       data-ad-slot="7864868911"
       data-ad-format="auto"></ins>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    window.adsbygoogle.push({});
  </script>

  <div class="auth-container">
    <h1>Welcome to Omevo</h1>
    <p>Sign in to continue</p>

    <button class="oauth-btn google" onclick="login('google')">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg"/>
      Sign in with Google
    </button>

    <button class="oauth-btn discord" onclick="login('discord')">
      <img src="https://www.svgrepo.com/show/353655/discord-icon.svg"/>
      Sign in with Discord
    </button>

    <button class="oauth-btn facebook" onclick="login('facebook')">
      <img src="https://www.svgrepo.com/show/157806/facebook.svg"/>
      Sign in with Facebook
    </button>
  </div>

  <script>
    function login(provider) {
      const backendURL = "https://term-production-bf65.up.railway.app";
      window.location.href = `${backendURL}/auth/${provider}?redirect=/callback.html`;
    }
  </script>

</body>
</html>
