<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omevo Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: rgba(18, 18, 26, 0.85);
  --fg-primary: #f0f0f5;
  --fg-secondary: #8888a0;
  --fg-muted: #55556a;
  --accent: #00d4aa;
  --accent-dim: rgba(0, 212, 170, 0.15);
  --accent-glow: rgba(0, 212, 170, 0.4);
  --danger: #ff4757;
  --danger-dim: rgba(255, 71, 87, 0.15);
  --sent-bg: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
  --received-bg: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.08);
  --border-focus: rgba(0, 212, 170, 0.5);
  --glass: rgba(18, 18, 26, 0.7);
  --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 24px;
  --radius-full: 9999px;
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--fg-primary);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ANIMATED BACKGROUND */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-gradient {
  position: absolute;
  width: 150%;
  height: 150%;
  top: -25%;
  left: -25%;
  background: 
    radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 100, 200, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 30% at 50% 90%, rgba(100, 0, 150, 0.05) 0%, transparent 50%);
  animation: bgPulse 20s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
  33% { transform: translate(2%, -2%) scale(1.02); opacity: 0.9; }
  66% { transform: translate(-1%, 1%) scale(0.98); opacity: 1.1; }
}

.grid-overlay {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
}

.floating-orbs {
  position: absolute;
  inset: 0;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: floatOrb 25s ease-in-out infinite;
}

.orb:nth-child(1) {
  width: 300px;
  height: 300px;
  background: rgba(0, 212, 170, 0.1);
  top: 10%;
  left: 10%;
  animation-delay: 0s;
}

.orb:nth-child(2) {
  width: 200px;
  height: 200px;
  background: rgba(0, 150, 255, 0.08);
  top: 60%;
  right: 15%;
  animation-delay: -8s;
}

.orb:nth-child(3) {
  width: 250px;
  height: 250px;
  background: rgba(150, 0, 200, 0.06);
  bottom: 10%;
  left: 30%;
  animation-delay: -16s;
}

@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -30px) scale(1.1); }
  50% { transform: translate(-20px, 20px) scale(0.95); }
  75% { transform: translate(25px, 15px) scale(1.05); }
}

/* MAIN CONTAINER */
.main-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 16px 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent-dim);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.logo-icon::before {
  content: '';
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  animation: logoPulse 2s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { transform: scale(1.1); box-shadow: 0 0 20px 5px var(--accent-glow); }
}

.logo h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--fg-primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}

.icon-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.icon-btn:hover::before {
  opacity: 0.1;
}

.icon-btn:active {
  transform: scale(0.95);
}

.icon-btn svg {
  width: 18px;
  height: 18px;
  position: relative;
  z-index: 1;
}

/* STATUS BAR */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--fg-muted);
  transition: all var(--transition-smooth);
  position: relative;
}

.status-dot.connected {
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}

.status-dot.connected::before {
  content: '';
  position: absolute;
  inset: -4px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  animation: statusPing 1.5s ease-out infinite;
}

@keyframes statusPing {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}

.status-dot.searching {
  background: #f59e0b;
  animation: searchPulse 1s ease-in-out infinite;
}

@keyframes searchPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.status-label {
  color: var(--fg-secondary);
}

.status-value {
  color: var(--fg-primary);
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.partner-info {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: var(--accent-dim);
  border-radius: var(--radius-full);
  border: 1px solid rgba(0, 212, 170, 0.2);
  opacity: 0;
  transform: translateX(10px);
  transition: all var(--transition-smooth);
}

.partner-info.visible {
  opacity: 1;
  transform: translateX(0);
}

.partner-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--bg-primary);
}

.partner-name {
  font-size: 12px;
  font-weight: 500;
}

/* CHAT AREA */
.chat-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.chat {
  height: 100%;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
  width: 6px;
}

.chat::-webkit-scrollbar-track {
  background: transparent;
}

.chat::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.chat::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.15);
}

/* MESSAGES */
.msg {
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  max-width: 75%;
  position: relative;
  animation: msgSlideIn 0.4s var(--transition-bounce);
}

@keyframes msgSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (prefers-reduced-motion: reduce) {
  .msg {
    animation: none;
  }
}

.msg.sent {
  background: var(--sent-bg);
  color: var(--bg-primary);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
  box-shadow: 0 4px 20px rgba(0, 212, 170, 0.25);
}

.msg.received {
  background: var(--received-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
}

.msg-sender {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 4px;
  opacity: 0.7;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}

.msg.sent .msg-sender {
  color: rgba(0, 0, 0, 0.5);
}

.msg.received .msg-sender {
  color: var(--accent);
}

.msg-text {
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
}

.msg-time {
  font-size: 10px;
  margin-top: 6px;
  opacity: 0.5;
  font-family: 'JetBrains Mono', monospace;
  text-align: right;
}

.msg.sent .msg-time {
  color: rgba(0, 0, 0, 0.4);
}

/* SYSTEM MESSAGE */
.msg.system {
  background: transparent;
  border: 1px dashed var(--border);
  align-self: center;
  max-width: 90%;
  text-align: center;
  padding: 10px 20px;
  font-size: 12px;
  color: var(--fg-secondary);
}

.msg.system::before {
  content: '';
  position: absolute;
  left: 50%;
  top: -1px;
  width: 30px;
  height: 1px;
  background: var(--bg-secondary);
  transform: translateX(-50%);
}

/* TYPING INDICATOR */
.typing-wrapper {
  padding: 0 20px 10px;
  min-height: 30px;
}

.typing-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--received-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  color: var(--fg-secondary);
  opacity: 0;
  transform: translateY(10px);
  transition: all var(--transition-smooth);
}

.typing-indicator.visible {
  opacity: 1;
  transform: translateY(0);
}

.typing-dots {
  display: flex;
  gap: 4px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: typingBounce 1.4s ease-in-out infinite;
}

.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* INPUT AREA */
.footer {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 16px 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 14px 18px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--fg-primary);
  font-size: 14px;
  font-family: 'Space Grotesk', sans-serif;
  outline: none;
  transition: all var(--transition-fast);
}

.input-wrapper input::placeholder {
  color: var(--fg-muted);
}

.input-wrapper input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.input-wrapper input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.char-counter {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--fg-muted);
  font-family: 'JetBrains Mono', monospace;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.input-wrapper input:focus ~ .char-counter {
  opacity: 1;
}

/* BUTTONS */
.btn {
  padding: 14px 24px;
  border-radius: var(--radius-lg);
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.btn:hover::before {
  opacity: 1;
}

.btn:active {
  transform: scale(0.96);
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.btn:disabled:hover::before {
  opacity: 0;
}

.btn-send {
  background: var(--sent-bg);
  color: var(--bg-primary);
  min-width: 100px;
  box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
}

.btn-send:hover:not(:disabled) {
  box-shadow: 0 6px 25px rgba(0, 212, 170, 0.4);
  transform: translateY(-1px);
}

.btn-send:active:not(:disabled) {
  transform: translateY(0) scale(0.98);
}

.btn-send svg {
  width: 16px;
  height: 16px;
}

.btn-skip {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(255, 71, 87, 0.3);
  min-width: 100px;
}

.btn-skip:hover:not(:disabled) {
  background: rgba(255, 71, 87, 0.25);
  border-color: var(--danger);
}

/* SEARCH SCREEN */
.search-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: all 0.5s ease;
}

.search-screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.05);
}

.search-content {
  text-align: center;
  max-width: 400px;
  padding: 40px;
}

.search-icon {
  width: 100px;
  height: 100px;
  margin: 0 auto 30px;
  background: var(--accent-dim);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: searchIconPulse 3s ease-in-out infinite;
}

@keyframes searchIconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.search-icon::before,
.search-icon::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid var(--accent);
  animation: searchRing 2s ease-out infinite;
}

.search-icon::before {
  width: 130%;
  height: 130%;
  animation-delay: 0s;
}

.search-icon::after {
  width: 160%;
  height: 160%;
  animation-delay: 0.5s;
}

@keyframes searchRing {
  0% { transform: scale(0.8); opacity: 0.8; }
  100% { transform: scale(1.1); opacity: 0; }
}

.search-icon svg {
  width: 40px;
  height: 40px;
  color: var(--accent);
}

.search-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--fg-primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.search-subtitle {
  font-size: 15px;
  color: var(--fg-secondary);
  margin-bottom: 40px;
  line-height: 1.6;
}

.btn-start {
  background: var(--sent-bg);
  color: var(--bg-primary);
  padding: 16px 40px;
  font-size: 16px;
  border-radius: var(--radius-full);
  box-shadow: 0 8px 30px rgba(0, 212, 170, 0.35);
  border: none;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  transition: all var(--transition-smooth);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0, 212, 170, 0.45);
}

.btn-start:active {
  transform: translateY(0);
}

/* SEARCHING STATE */
.searching-state {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.searching-state.visible {
  display: flex;
}

.search-spinner {
  width: 60px;
  height: 60px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.searching-text {
  font-size: 14px;
  color: var(--fg-secondary);
}

.searching-dots {
  display: inline-flex;
  gap: 3px;
  margin-left: 4px;
}

.searching-dots span {
  animation: dotFade 1.4s ease-in-out infinite;
}

.searching-dots span:nth-child(1) { animation-delay: 0s; }
.searching-dots span:nth-child(2) { animation-delay: 0.2s; }
.searching-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotFade {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

/* TOAST NOTIFICATIONS */
.toast-container {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  padding: 14px 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastSlide 0.4s var(--transition-bounce);
  box-shadow: var(--shadow-lg);
}

@keyframes toastSlide {
  from {
    opacity: 0;
    transform: translateX(50px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.toast.toast-out {
  animation: toastOut 0.3s ease forwards;
}

@keyframes toastOut {
  to {
    opacity: 0;
    transform: translateX(50px);
  }
}

.toast.success {
  border-color: rgba(0, 212, 170, 0.3);
}

.toast.success .toast-icon {
  color: var(--accent);
}

.toast.error {
  border-color: rgba(255, 71, 87, 0.3);
}

.toast.error .toast-icon {
  color: var(--danger);
}

.toast-icon {
  width: 18px;
  height: 18px;
}

/* EMPTY STATE */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--fg-muted);
  gap: 12px;
  padding: 40px;
  text-align: center;
}

.empty-state svg {
  width: 48px;
  height: 48px;
  opacity: 0.5;
}

.empty-state p {
  font-size: 14px;
  max-width: 260px;
  line-height: 1.5;
}

/* RESPONSIVE */
@media (max-width: 480px) {
  header {
    padding: 12px 16px;
  }
  
  .logo h1 {
    font-size: 18px;
  }
  
  .status-bar {
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
  
  .partner-info {
    align-self: flex-end;
  }
  
  .chat {
    padding: 16px;
  }
  
  .msg {
    max-width: 85%;
  }
  
  .footer {
    padding: 12px 16px;
    gap: 10px;
  }
  
  .btn {
    padding: 12px 18px;
    min-width: auto;
  }
  
  .btn-send span {
    display: none;
  }
  
  .btn-send {
    min-width: 48px;
    padding: 12px;
  }
  
  .search-content {
    padding: 30px;
  }
  
  .search-title {
    font-size: 24px;
  }
}

/* FOCUS VISIBLE */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

button:focus-visible,
input:focus-visible {
  outline: none;
}

/* KEYBOARD SHORTCUT INDICATOR */
.shortcut-hint {
  display: none;
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg-secondary);
  border-radius: 4px;
  margin-left: 8px;
  color: var(--fg-muted);
  font-family: 'JetBrains Mono', monospace;
}

@media (min-width: 768px) {
  .shortcut-hint {
    display: inline;
  }
}
</style>
</head>

<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
  <div class="floating-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- MAIN CONTAINER -->
<div class="main-container">

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>Omevo</h1>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>
</header>

<div class="status-bar">
  <div class="status-item">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label">Status:</span>
    <span class="status-value" id="statusText">Idle</span>
  </div>
  <div class="partner-info" id="partnerInfo">
    <div class="partner-avatar">S</div>
    <span class="partner-name">Stranger</span>
  </div>
</div>

<div class="chat-wrapper">
  <div id="chat" class="chat">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <p>Connect with someone to start chatting</p>
    </div>
  </div>
</div>

<div class="typing-wrapper">
  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <span>Stranger is typing</span>
  </div>
</div>

<div class="footer">
  <div class="input-wrapper">
    <input id="input" placeholder="Type a message..." maxlength="1000" disabled />
    <span class="char-counter" id="charCounter">0/1000</span>
  </div>
  <button class="btn btn-send" id="sendBtn" disabled aria-label="Send message">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
    <span>Send</span>
    <span class="shortcut-hint">Enter</span>
  </button>
  <button class="btn btn-skip" id="skipBtn" disabled aria-label="Skip to next stranger">
    Skip
    <span class="shortcut-hint">Esc</span>
  </button>
</div>

</div>

<!-- SEARCH SCREEN -->
<div id="searchScreen" class="search-screen">
  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="floating-orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>
  </div>
  
  <div class="search-content" id="searchContent">
    <div class="search-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
    </div>
    <h2 class="search-title">Ready to connect?</h2>
    <p class="search-subtitle">Meet new people from around the world. Be respectful and have fun conversations.</p>
    <button class="btn-start" id="startBtn">Start Chat</button>
  </div>
  
  <div class="searching-state" id="searchingState">
    <div class="search-spinner"></div>
    <div class="searching-text">
      Finding someone for you<span class="searching-dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>
</div>

<script>
const socket = io("https://term-production-bf65.up.railway.app", {
  transports: ["websocket"]
});

// DOM Elements
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const partnerInfo = document.getElementById("partnerInfo");
const typingIndicator = document.getElementById("typingIndicator");
const searchScreen = document.getElementById("searchScreen");
const searchContent = document.getElementById("searchContent");
const searchingState = document.getElementById("searchingState");
const emptyState = document.getElementById("emptyState");
const sendBtn = document.getElementById("sendBtn");
const skipBtn = document.getElementById("skipBtn");
const startBtn = document.getElementById("startBtn");
const charCounter = document.getElementById("charCounter");
const toastContainer = document.getElementById("toastContainer");

let room = null;
let typingTimeout = null;
let msgCount = 0;

// Token
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

// Toast Notification System
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      ${type === 'success' 
        ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>'
        : '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>'
      }
    </svg>
    <span>${message}</span>
  `;
  toastContainer.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// Update Status
function updateStatus(status, text) {
  statusDot.className = 'status-dot ' + status;
  statusText.textContent = text;
}

// Update Character Counter
input.addEventListener('input', () => {
  charCounter.textContent = `${input.value.length}/1000`;
});

// Start Chat
function startChat() {
  searchContent.style.display = 'none';
  searchingState.classList.add('visible');
  updateStatus('searching', 'Searching');
  
  socket.emit("auth", { token });
}

// Socket Events
socket.on("connect", () => {
  console.log("Connected to server");
});

socket.on("auth_success", () => {
  updateStatus('searching', 'Searching');
});

socket.on("match_found", (data) => {
  room = data.channel;
  
  // Hide search screen
  searchScreen.classList.add('hidden');
  
  // Update UI
  updateStatus('connected', 'Connected');
  partnerInfo.classList.add('visible');
  
  // Enable controls
  input.disabled = false;
  sendBtn.disabled = false;
  skipBtn.disabled = false;
  input.focus();
  
  // Remove empty state
  if (emptyState) {
    emptyState.style.display = 'none';
  }
  
  socket.emit("join", {
    room: room,
    uid: data.peerId
  });
  
  addMsg("Connected to a stranger. Say hello!", "system");
  showToast("Connected to a stranger!", "success");
});

// Receive Message
socket.on("message", (msg) => {
  const sender = msg.username === "You" ? "Stranger" : msg.username;
  addMsg(msg.text, "received", sender);
});

// Typing
socket.on("typing", () => {
  clearTimeout(typingTimeout);
  typingIndicator.classList.add('visible');
  typingTimeout = setTimeout(() => {
    typingIndicator.classList.remove('visible');
  }, 2000);
});

// Partner Disconnected
socket.on("partner_disconnected", () => {
  addMsg("Stranger has disconnected", "system");
  partnerInfo.classList.remove('visible');
  updateStatus('', 'Idle');
  input.disabled = true;
  sendBtn.disabled = true;
  skipBtn.disabled = true;
  showToast("Stranger disconnected", "error");
  room = null;
});

// Error
socket.on("error", (err) => {
  addMsg("Error: " + err.message, "system");
  showToast(err.message, "error");
});

// Send Message
function sendMsg() {
  const text = input.value.trim();
  if (!text || !room) return;
  
  socket.emit("message", {
    room: room,
    text: text
  });
  
  addMsg(text, "sent", "You");
  input.value = "";
  charCounter.textContent = "0/1000";
  input.focus();
}

// Add Message
function addMsg(text, type, sender = null) {
  msgCount++;
  
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.style.animationDelay = `${msgCount * 0.05}s`;
  
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  
  if (type === 'system') {
    div.innerHTML = `<span class="msg-text">${text}</span>`;
  } else {
    div.innerHTML = `
      ${sender ? `<div class="msg-sender">${sender}</div>` : ''}
      <div class="msg-text">${escapeHtml(text)}</div>
      <div class="msg-time">${time}</div>
    `;
  }
  
  chat.appendChild(div);
  
  // Smooth scroll to bottom
  requestAnimationFrame(() => {
    chat.scrollTo({
      top: chat.scrollHeight,
      behavior: 'smooth'
    });
  });
}

// Escape HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Skip
function skip() {
  if (!room) return;
  
  socket.emit("skip", { room });
  room = null;
  
  // Reset UI
  partnerInfo.classList.remove('visible');
  updateStatus('', 'Idle');
  input.disabled = true;
  sendBtn.disabled = true;
  skipBtn.disabled = true;
  
  // Clear chat except system messages
  const messages = chat.querySelectorAll('.msg:not(.system)');
  messages.forEach(msg => msg.remove());
  
  // Show search screen
  searchScreen.classList.remove('hidden');
  searchContent.style.display = 'block';
  searchingState.classList.remove('visible');
  
  showToast("Skipped to next stranger", "success");
}

// Event Listeners
startBtn.addEventListener("click", startChat);

sendBtn.addEventListener("click", sendMsg);

skipBtn.addEventListener("click", skip);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// Typing Event
input.addEventListener("input", () => {
  if (room) {
    socket.emit("typing", { room });
  }
});

// Keyboard Shortcuts
document.addEventListener("keydown", (e) => {
  // Skip with Escape
  if (e.key === "Escape" && room) {
    skip();
  }
  
  // Focus input with /
  if (e.key === "/" && !input.disabled && document.activeElement !== input) {
    e.preventDefault();
    input.focus();
  }
});

// Theme Toggle (placeholder functionality)
document.getElementById("themeToggle").addEventListener("click", () => {
  showToast("Theme toggle coming soon!", "success");
});

// Settings Button (placeholder functionality)
document.getElementById("settingsBtn").addEventListener("click", () => {
  showToast("Settings panel coming soon!", "success");
});

// Handle visibility change
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === 'visible' && !input.disabled) {
    input.focus();
  }
});

// Initial focus
window.addEventListener("load", () => {
  startBtn.focus();
});
</script>

</body>
</html>
