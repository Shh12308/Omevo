<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing you in...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b1f3a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .spinner {
      margin-top: 20px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div>
    <h2>Signing you in...</h2>
    <p>Please wait</p>
    <div class="spinner"></div>
  </div>

<script>
  const backendURL = "https://term-production-bf65.up.railway.app";

  function getCodeFromURL() {
    try {
      const params = new URLSearchParams(window.location.search);
      return params.get("code") || null;
    } catch {
      return null;
    }
  }

  async function handleAuth() {
  const code = new URLSearchParams(window.location.search).get("code");

  console.log("CODE:", code);

  if (!code) {
    alert("Missing code");
    return;
  }

  try {
    const res = await fetch(`${backendURL}/auth/exchange`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    console.log("Exchange status:", res.status);

    const text = await res.text();
    console.log("Exchange raw response:", text);

    const data = JSON.parse(text);

    if (!data.token) {
      throw new Error("No token in response");
    }

    localStorage.setItem("token", data.token);

    window.location.href = "/achat.html";

  } catch (err) {
    console.error("FULL ERROR:", err);
    alert("Login failed. Check console.");
  }
}

  handleAuth();
</script>

</body>
</html>
