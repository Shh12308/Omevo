<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing you in...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b1f3a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .spinner {
      margin-top: 20px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div>
    <h2>Signing you in...</h2>
    <p>Please wait</p>
    <div class="spinner"></div>
  </div>

<script>
  const backendURL = "https://term-production-bf65.up.railway.app";

  async function handleAuth() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const provider = params.get("provider"); // e.g., discord, google, facebook

    console.log("CODE:", code, "PROVIDER:", provider);

    if (!code || !provider) {
      alert("Missing code or provider in URL");
      return;
    }

    try {
      const res = await fetch(`${backendURL}/auth/exchange`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, provider })
      });

      const text = await res.text();
      console.log("Exchange raw response:", text);

      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        console.error("Failed to parse JSON:", e);
        alert("Login failed: invalid server response");
        return;
      }

      if (!data.token) {
        console.error("No token returned:", data);
        alert("Login failed: token not found");
        return;
      }

      try {
        localStorage.setItem("token", data.token);
      } catch (e) {
        console.error("Failed to save token in localStorage:", e);
        alert("Login failed: cannot save token");
        return;
      }

      // Redirect to main page after successful login
      window.location.href = "/achat.html";

    } catch (err) {
      console.error("FULL ERROR:", err);
      alert("Login failed. Check console for details.");
    }
  }

  handleAuth();
</script>

</body>
</html>
