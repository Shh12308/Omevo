<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChatVibe - Video Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        /* CSS: Same as original, compacted for brevity */
        :root { --primary: #6366f1; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); --text: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Core Layouts */
        #loadingScreen, #permissionOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .hidden { display: none !important; }
        
        #videoContainer { flex: 1; position: relative; background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        
        #localVideoWrapper { position: absolute; width: 150px; height: 200px; bottom: 120px; right: 20px; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary); z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #blurOverlay { position: absolute; inset: 0; backdrop-filter: blur(10px); background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        #matchingScreen { text-align: center; }
        .pulse-animation { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
        
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; background: var(--glass); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .control-btn:hover { background: var(--primary); transform: translateY(-2px); }
        .control-btn.danger { background: #ef4444; }
        
        /* Panels */
        .side-panel { position: fixed; top: 0; width: 300px; height: 100%; background: #1e293b; z-index: 200; padding: 20px; transition: transform 0.3s; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .side-panel.left { left: 0; transform: translateX(-100%); }
        .side-panel.right { right: 0; transform: translateX(100%); }
        .side-panel.open { transform: translateX(0); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #94a3b8; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--primary); z-index: 3000; }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="pulse-animation"><i class="fas fa-video"></i></div>
        <div>Loading ChatVibe...</div>
    </div>

    <!-- Permission Overlay -->
    <div id="permissionOverlay" class="hidden">
        <div style="text-align: center; max-width: 400px; padding: 20px;">
            <i class="fas fa-camera" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Camera Access Required</h2>
            <p style="margin: 15px 0; color: #94a3b8;">Please allow access to your camera and microphone to start video chatting.</p>
            <button onclick="requestPermissions()" class="control-btn" style="width: auto; padding: 0 30px;">Allow Access</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <div id="videoContainer">
            <video id="remoteVideo" autoplay playsinline></video>
            
            <!-- Local Video -->
            <div id="localVideoWrapper">
                <div id="localVideo"></div>
            </div>

            <!-- Overlay for Matching -->
            <div id="blurOverlay" class="hidden">
                <div id="matchingScreen">
                    <div class="pulse-animation"><i class="fas fa-search"></i></div>
                    <div>Looking for a match...</div>
                    <button onclick="stopMatching()" style="margin-top: 20px; background: #ef4444;" class="control-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <div id="startControls">
                <button class="control-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
                <button class="control-btn" onclick="toggleProfile()"><i class="fas fa-user"></i></button>
                <button class="control-btn" id="startBtn" onclick="startMatching()" style="background: var(--primary); width: 60px; height: 60px;"><i class="fas fa-video"></i></button>
            </div>
            <div id="activeControls" class="hidden">
                <button class="control-btn" onclick="toggleChat()"><i class="fas fa-comment"></i></button>
                <button class="control-btn danger" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
                <button class="control-btn" onclick="nextMatch()"><i class="fas fa-forward"></i></button>
                <button class="control-btn" onclick="toggleCamera()"><i class="fas fa-camera"></i></button>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="side-panel left">
        <h3 style="margin-bottom: 20px;">Settings</h3>
        <div class="input-group">
            <label>I am</label>
            <select id="genderSelect"><option value="male">Male</option><option value="female">Female</option></select>
        </div>
        <div class="input-group">
            <label>Looking for</label>
            <select id="lookingForSelect"><option value="any">Anyone</option><option value="male">Male</option><option value="female">Female</option></select>
        </div>
        <button onclick="saveSettings()" class="control-btn" style="width: 100%;">Save</button>
    </div>

    <!-- Profile Panel -->
    <div id="profilePanel" class="side-panel right">
        <h3 style="margin-bottom: 20px;">Profile</h3>
        <div id="profileInfo">
            <p>Name: <span id="userName">Guest</span></p>
            <p>Coins: <span id="userCoins">0</span></p>
        </div>
        <div class="input-group">
            <label>Display Name</label>
            <input type="text" id="displayInput" />
        </div>
        <button onclick="saveProfile()" class="control-btn" style="width: 100%; margin-top: 10px;">Update</button>
    </div>

    <!-- Chat Panel -->
    <div id="chatPanel" class="side-panel right">
        <h3 style="margin-bottom: 20px;">Chat</h3>
        <div id="chatMessages" style="flex: 1; overflow-y: auto; margin-bottom: 10px;"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="messageInput" placeholder="Message..." style="flex: 1; padding: 10px; border-radius: 20px; border: none; background: #0f172a; color: white;">
            <button onclick="sendMessage()" class="control-btn" style="width: 40px; height: 40px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const BACKEND = window.location.origin; // Automatically uses current domain
        const AGORA_APP_ID = "0f9094ed4a8e4dea934059b0ea8b5182"; // Replace with your actual Agora ID or fetch from config
        
        let token = localStorage.getItem("token");
        let socket = null;
        let client = null;
        let localTracks = {};
        let currentRoom = null;
        let partnerId = null;
        let isMatching = false;
        let isInCall = false;
        let pollInterval = null;

        // --- INITIALIZATION ---
        async function init() {
            document.getElementById("loadingScreen").classList.remove("hidden");
            
            // Check URL for token from OAuth
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                token = urlToken;
                localStorage.setItem("token", token);
                window.history.replaceState({}, document.title, window.location.pathname); // Clean URL
            }

            if (!token) {
                // Mock login for demo if no token
                console.warn("No token found. Proceeding as guest.");
            }

            initSocket();
            await loadSettings();
            
            document.getElementById("loadingScreen").classList.add("hidden");
            document.getElementById("permissionOverlay").classList.remove("hidden");
            document.getElementById("app").classList.remove("hidden");
        }

        // --- PERMISSIONS ---
        async function requestPermissions() {
            try {
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                localTracks.videoTrack.play("localVideo");
                
                document.getElementById("permissionOverlay").classList.add("hidden");
            } catch (e) {
                alert("Permissions denied. Please allow camera/mic.");
            }
        }

        // --- SOCKET ---
        function initSocket() {
            socket = io(BACKEND, { transports: ['websocket'] });
            
            socket.on("connect", () => {
                if (token) socket.emit("auth", { token });
            });
            
            socket.on("match_found", async (data) => {
                console.log("Match found via socket!", data);
                if (isMatching && !isInCall) {
                    partnerId = data.peerId;
                    currentRoom = data.channel;
                    await startCall(data.channel, data.peerId);
                }
            });
            
            socket.on("message", (data) => addMessage(data.text, false));
            
            socket.on("disconnect", () => {
                if (isInCall) endCall();
            });
        }

        // --- MATCHMAKING ---
        async function startMatching() {
            if (isMatching || isInCall) return;
            if (!localTracks.videoTrack) return requestPermissions();

            isMatching = true;
            document.getElementById("blurOverlay").classList.remove("hidden");
            document.getElementById("startControls").classList.add("hidden");
            document.getElementById("activeControls").classList.remove("hidden");

            const payload = {
                gender: document.getElementById("genderSelect").value,
                location: "any",
                interests: []
            };

            try {
                const res = await fetch(`${BACKEND}/queue/enqueue`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.matched) {
                    partnerId = data.peerId;
                    currentRoom = data.channel;
                    await startCall(data.channel, data.peerId);
                } else {
                    // Fallback polling
                    pollInterval = setInterval(checkMatchStatus, 3000);
                }
            } catch (e) {
                console.error(e);
                stopMatching();
            }
        }

        async function checkMatchStatus() {
            // Polling fallback in case socket misses event
            const res = await fetch(`${BACKEND}/queue/check`, { headers: { Authorization: `Bearer ${token}` }});
            const data = await res.json();
            if (data.matched) {
                clearInterval(pollInterval);
                partnerId = data.peerId;
                currentRoom = data.channel;
                await startCall(data.channel, data.peerId);
            }
        }

        function stopMatching() {
            isMatching = false;
            clearInterval(pollInterval);
            document.getElementById("blurOverlay").classList.add("hidden");
            document.getElementById("startControls").classList.remove("hidden");
            document.getElementById("activeControls").classList.add("hidden");
            fetch(`${BACKEND}/queue/leave`, { method: "POST", headers: { Authorization: `Bearer ${token}` } });
        }

        // --- CALL ---
        async function startCall(channelName, peerUid) {
            isMatching = false;
            isInCall = true;
            clearInterval(pollInterval);
            document.getElementById("blurOverlay").classList.add("hidden");
            
            try {
                client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                
                // Get Token
                const uid = Math.floor(Math.random() * 100000);
                const tokenRes = await fetch(`${BACKEND}/generateToken`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                    body: JSON.stringify({ channelName, uid })
                });
                const { rtcToken, appID } = await tokenRes.json();

                await client.join(appID || AGORA_APP_ID, channelName, rtcToken, uid);
                
                if (!localTracks.videoTrack) await requestPermissions(); // Double check
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);

                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        const remoteVideoTrack = user.videoTrack;
                        const remoteStream = new MediaStream([remoteVideoTrack.getMediaStreamTrack()]);
                        document.getElementById("remoteVideo").srcObject = remoteStream;
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });
                
                socket.emit("join_room", { room: channelName });

            } catch (e) {
                console.error("Call error", e);
                endCall();
            }
        }

        function endCall() {
            isInCall = false;
            if (client) client.leave();
            
            document.getElementById("remoteVideo").srcObject = null;
            document.getElementById("startControls").classList.remove("hidden");
            document.getElementById("activeControls").classList.add("hidden");
            
            if (socket && currentRoom) socket.emit("leave_room", { room: currentRoom });
            currentRoom = null;
        }
        
        function nextMatch() {
            endCall();
            setTimeout(startMatching, 500);
        }

        function toggleCamera() {
            if (localTracks.videoTrack) {
                localTracks.videoTrack.setEnabled(!localTracks.videoTrack.enabled);
            }
        }

        // --- UI HELPERS ---
        function showToast(msg) {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("open"); }
        function toggleProfile() { document.getElementById("profilePanel").classList.toggle("open"); }
        function toggleChat() { document.getElementById("chatPanel").classList.toggle("open"); }

        function addMessage(text, isOwn) {
            const div = document.createElement("div");
            div.style.cssText = `margin: 5px 0; text-align: ${isOwn ? 'right' : 'left'};`;
            div.innerHTML = `<span style="background: ${isOwn ? '#6366f1' : '#334155'}; padding: 5px 10px; border-radius: 10px;">${text}</span>`;
            document.getElementById("chatMessages").appendChild(div);
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            if (!input.value || !currentRoom) return;
            socket.emit("message", { room: currentRoom, text: input.value });
            addMessage(input.value, true);
            input.value = "";
        }

        async function loadSettings() {
            if(!token) return;
            try {
                const res = await fetch(`${BACKEND}/user/profile`, { headers: { Authorization: `Bearer ${token}` }});
                const user = await res.json();
                document.getElementById("userName").innerText = user.username;
                document.getElementById("displayInput").value = user.username;
                if(user.gender) document.getElementById("genderSelect").value = user.gender;
            } catch(e) {}
        }

        async function saveSettings() {
            const gender = document.getElementById("genderSelect").value;
            await fetch(`${BACKEND}/api/user/preferences`, {
                method: "POST",
                headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                body: JSON.stringify({ gender })
            });
            toggleSettings();
        }

        async function saveProfile() {
            const name = document.getElementById("displayInput").value;
            await fetch(`${BACKEND}/user/display-name`, {
                method: "POST",
                headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                body: JSON.stringify({ display_name: name })
            });
            document.getElementById("userName").innerText = name;
            toggleProfile();
        }
        
        // --- START ---
        init();
    </script>
  </body>
</html>
